services:
  redis:
    image: redis:alpine
    container_name: condosync_redis
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORDWORD}
  ports:
    - "5540:5540"
  depends_on:
    - redis

  rabbitmq:
    image: rabbitmq:3-management
    container_name: condosync_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: condosync_api
    ports:
      - "${PORT_BACKEND}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=${JWT_KEY}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASS}
    depends_on:
      - rabbitmq
      - redis

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: condosync_web
    ports:
      - "${PORT_FRONTEND}:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:${PORT_BACKEND}/api
    command: npm run dev -- --host