services:
  redis:
    image: redis:alpine
    container_name: condosync_backend_redis
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "5540:5540" # Mapeia a porta do container para o seu navegador
    depends_on:
      - redis

  rabbitmq:
    image: rabbitmq:3-management
    container_name: condosync_backend_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
